
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeakSense - Smart Water Leak Detection</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2306b6d4'%3E%3Cpath d='M12 2C12 2 6 9 6 14C6 17.31 8.69 20 12 20C15.31 20 18 17.31 18 14C18 9 12 2 12 2Z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-brand">
        <div class="brand-icon-container">
          <i data-lucide="droplets" class="brand-icon"></i>
        </div>
        <span class="brand-name">LeakSense</span>
      </div>
      <div class="navbar-controls">
        <label for="zoneSelect" class="zone-label">Selected Zone</label>
        <select id="zoneSelect" class="zone-select"></select>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header Section -->
      <section class="header-section">
        <h1 class="main-title">Smart Water Leak Dashboard</h1>
        <p class="main-subtitle">Monitor flow rate, pressure, and leak status across your zones in real-time</p>
      </section>

      <!-- Stats Section -->
      <section class="stats-section">
        <h2 class="section-label">Live Overview</h2>
        <div class="stats-grid">
          <div class="stat-card stat-card-zone">
            <div class="stat-header">
              <div class="stat-icon-wrapper">
                <i data-lucide="map-pin" class="stat-icon"></i>
              </div>
              <span class="stat-label">Zone</span>
            </div>
            <p class="stat-value" id="zoneName">Loading...</p>
          </div>

          <div class="stat-card stat-card-flow">
            <div class="stat-header">
              <div class="stat-icon-wrapper">
                <i data-lucide="gauge" class="stat-icon"></i>
              </div>
              <span class="stat-label">Flow Rate</span>
            </div>
            <p class="stat-value" id="flowRate">--</p>
          </div>

          <div class="stat-card stat-card-pressure">
            <div class="stat-header">
              <div class="stat-icon-wrapper">
                <i data-lucide="activity" class="stat-icon"></i>
              </div>
              <span class="stat-label">Pressure</span>
            </div>
            <p class="stat-value" id="pressure">--</p>
          </div>

          <div class="stat-card stat-card-status status-card" id="statusCard">
            <div class="stat-header">
              <div class="stat-icon-wrapper">
                <i data-lucide="shield-check" class="stat-icon" id="statusIcon"></i>
              </div>
              <span class="stat-label">Status</span>
            </div>
            <p class="stat-value" id="status">--</p>
          </div>
        </div>
      </section>

      <!-- Chart Section -->
      <section class="chart-section">
        <h2 class="section-label">Live Sensor Trends</h2>
        <div class="chart-container">
          <canvas id="historyChart"></canvas>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer-text">© 2026 LeakSense. All rights reserved.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
